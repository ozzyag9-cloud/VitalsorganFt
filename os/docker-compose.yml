services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prooflife
      POSTGRES_PASSWORD: prooflife
      POSTGRES_DB: proof_of_life
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  chain-node:
    image: node:22-bookworm-slim
    working_dir: /opt/proof-of-life
    command: ["npm", "run", "dev:chain"]
    volumes:
      - ..:/opt/proof-of-life:ro
      - chain-data:/var/lib/proof-of-life
    environment:
      NODE_ENV: development

  backend:
    image: node:22-bookworm-slim
    working_dir: /opt/proof-of-life
    command: ["npm", "run", "dev:backend"]
    volumes:
      - ..:/opt/proof-of-life:ro
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://prooflife:prooflife@postgres:5432/proof_of_life
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - chain-node

volumes:
  postgres-data:
  redis-data:
  chain-data:
