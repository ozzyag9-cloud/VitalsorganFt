# fly.toml app configuration file generated for vitalsdynft on 2026-05-13T22:12:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vitalsdynft'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
